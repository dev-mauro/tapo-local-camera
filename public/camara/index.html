<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cámara de Seguridad | Live Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-gradients">
        <div class="gradient-blob shape-1"></div>
        <div class="gradient-blob shape-2"></div>
    </div>

    <div class="monitor-container">
        <header class="glass-panel">
            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-camera"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                <h1>TAPO SecOps Monitor</h1>
            </div>
            
            <div class="status-panel">
                <span id="strategy-badge" class="badge">Detecting...</span>
                <span id="delay-badge" class="badge delay" title="Latencia en vivo">Delay: --</span>
                
                <div class="user-control">
                    <div class="users-badge" id="hover-users">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        <span id="users-count">1</span>
                        <div class="users-dropdown glass-panel" id="users-dropdown">
                            <!-- Generado por JS -->
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="player-section">
            <div class="video-wrapper glass-panel" id="video-container">
                <video id="videoElement" autoplay muted playsinline></video>
                
                <!-- Error Overlay -->
                <div id="error-overlay" class="error-overlay" style="display: none;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"></polygon>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <h2>SEÑAL PERDIDA</h2>
                    <p id="error-message">Fallo en la recepción del stream</p>
                    <button id="btn-retry" class="error-btn">Reconectar Cámara</button>
                </div>

                <!-- Custom Controls Overlay -->
                <div class="custom-controls" id="custom-controls">
                    <div class="controls-main-row">
                        <div class="controls-left">
                            <button class="control-btn" id="btn-play-pause" title="Play/Pause">
                                <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                                <svg id="icon-play" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            </button>
                            
                            <div class="volume-container">
                                <button class="control-btn" id="btn-mute" title="Mute/Unmute">
                                    <svg id="icon-vol-high" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                                    <svg id="icon-vol-mute" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="1" x2="1" y2="23"></line></svg>
                                </button>
                                <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.05" value="1">
                            </div>

                            <div class="live-indicator">
                                <span class="recording-dot"></span> <span class="live-text">LIVE</span>
                            </div>
                        </div>
                        
                        <div class="controls-right">
                            <button class="control-btn" id="btn-pip" title="Picture in Picture">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="12" y="11" width="7" height="6"></rect></svg>
                            </button>
                            <button class="control-btn" id="btn-fullscreen" title="Fullscreen">
                                <svg id="icon-fullscreen" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                                <svg id="icon-minimize" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path></svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="progress-container">
                        <span class="time-label" id="time-current">--:--</span>
                        <input type="range" id="progress-bar-slider" class="progress-bar-slider" min="0" max="100" value="100" step="0.1">
                        <span class="time-label time-live" id="time-live">Live</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>
    <script src="app.js"></script>
</body>
</html>
