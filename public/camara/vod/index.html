<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabaciones | TAPO Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .vod-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 16px;
            margin-top: 16px;
            min-height: 0;
        }
        @media (max-width: 820px) { .vod-layout { grid-template-columns: 1fr; } }

        .vod-sidebar { padding: 12px; max-height: 75vh; overflow-y: auto; }
        .vod-sidebar h2 { font-size: 0.95rem; margin: 4px 8px 12px; opacity: 0.8; }

        .vod-player-panel { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
        .vod-video-wrap {
            position: relative; background: #000; border-radius: 12px; overflow: hidden;
            aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center;
        }
        .vod-video-wrap video { width: 100%; height: 100%; display: block; }

        /* La hoja principal oculta los controles nativos (style.css); aquí los
           re-habilitamos para el reproductor del VOD. */
        #vod-video::-webkit-media-controls,
        #vod-video::-webkit-media-controls-enclosure,
        #vod-video::-webkit-media-controls-panel {
            display: flex !important;
        }

        .vod-speed {
            display: flex; align-items: center; gap: 6px; font-size: 0.85rem; opacity: 0.9;
        }
        .vod-speed select {
            background: rgba(255,255,255,0.08); color: inherit; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; padding: 6px 10px; font: inherit; cursor: pointer;
        }
        .vod-speed select option { background: #1e2230; color: #fff; }

        .vod-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 12px;
            background: rgba(0,0,0,0.55); text-align: center; padding: 20px;
        }
        .vod-overlay.hidden { display: none; }
        .vod-overlay small { opacity: 0.7; max-width: 360px; }

        .vod-meta { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .vod-title { font-size: 1.1rem; font-weight: 500; }
        .vod-actions { display: flex; gap: 8px; }

        .vod-recording-item {
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer;
            transition: background 0.15s;
        }
        .vod-recording-item:hover { background: rgba(255,255,255,0.06); }
        .vod-recording-item.active { background: rgba(99,102,241,0.18); }
        .vod-recording-item .recording-name { display: block; font-size: 0.9rem; }
        .vod-recording-item .recording-meta { display: block; font-size: 0.75rem; opacity: 0.65; margin-top: 2px; }
    </style>
</head>

<body>
    <div class="background-gradients">
        <div class="gradient-blob shape-1"></div>
        <div class="gradient-blob shape-2"></div>
    </div>

    <div class="monitor-container">
        <header class="glass-panel">
            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7"/>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                </svg>
                <h1>Grabaciones</h1>
            </div>
            <div class="status-panel">
                <a href="/camara" class="header-icon-btn" title="Volver al monitor en vivo" style="text-decoration:none;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </a>
            </div>
        </header>

        <main class="vod-layout">
            <aside class="vod-sidebar glass-panel">
                <h2>Todas las grabaciones</h2>
                <div id="vod-list"></div>
            </aside>

            <section class="vod-player-panel glass-panel">
                <div class="vod-video-wrap">
                    <video id="vod-video" controls playsinline preload="metadata"></video>
                    <div class="vod-overlay" id="vod-overlay">
                        <div class="spinner"></div>
                        <span id="vod-overlay-text">Preparando video…</span>
                        <small id="vod-overlay-hint">La primera vez se convierte el archivo; puede tardar unos segundos.</small>
                    </div>
                </div>

                <div class="vod-meta">
                    <span class="vod-title" id="vod-title">—</span>
                    <div class="vod-actions">
                        <label class="vod-speed">
                            Velocidad
                            <select id="vod-speed">
                                <option value="1">x1</option>
                                <option value="2">x2</option>
                                <option value="4">x4</option>
                                <option value="8">x8</option>
                                <option value="16">x16</option>
                                <option value="32">x32</option>
                            </select>
                        </label>
                        <a id="vod-download" class="header-icon-btn" title="Descargar" download href="#">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        </a>
                        <button id="vod-delete" class="header-icon-btn" title="Eliminar">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="vod.js"></script>
</body>
</html>
