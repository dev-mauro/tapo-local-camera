<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabaciones | TAPO Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .vod-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 16px;
            margin-top: 16px;
            min-height: 0;
        }
        @media (max-width: 820px) { .vod-layout { grid-template-columns: 1fr; } }

        .vod-sidebar { padding: 12px; max-height: 75vh; overflow-y: auto; }
        .vod-sidebar h2 { font-size: 0.95rem; margin: 4px 8px 12px; opacity: 0.8; }

        .vod-player-panel { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
        .vod-video-wrap {
            position: relative; background: #000; border-radius: 12px; overflow: hidden;
            aspect-ratio: 16 / 9; display: flex; align-items: center; justify-content: center;
        }
        .vod-video-wrap video { width: 100%; height: 100%; display: block; }

        /* La hoja principal oculta los controles nativos (style.css); aquí los
           re-habilitamos para el reproductor del VOD. */
        #vod-video::-webkit-media-controls,
        #vod-video::-webkit-media-controls-enclosure,
        #vod-video::-webkit-media-controls-panel {
            display: flex !important;
        }

        .vod-speed { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .vod-speed-label { font-size: 0.85rem; opacity: 0.7; margin-right: 2px; }
        .speed-btn {
            background: rgba(255,255,255,0.08); color: inherit; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; padding: 5px 10px; font: inherit; font-size: 0.85rem; cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .speed-btn:hover { background: rgba(255,255,255,0.16); }
        .speed-btn.active { background: rgba(99,102,241,0.35); border-color: rgba(99,102,241,0.7); }

        .vod-recording-item .recording-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .vod-recording-item .rec-btn {
            display: flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; border-radius: 8px; cursor: pointer;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            color: inherit; text-decoration: none;
        }
        .vod-recording-item .rec-btn:hover { background: rgba(255,255,255,0.16); }
        .vod-recording-item .rec-delete:hover { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.5); }

        .vod-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 12px;
            background: rgba(0,0,0,0.55); text-align: center; padding: 20px;
        }
        .vod-overlay.hidden { display: none; }
        .vod-overlay small { opacity: 0.7; max-width: 360px; }

        .vod-meta { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
        .vod-title { font-size: 1.1rem; font-weight: 500; }
        .vod-actions { display: flex; gap: 8px; }

        .vod-recording-item {
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer;
            transition: background 0.15s;
        }
        .vod-recording-item:hover { background: rgba(255,255,255,0.06); }
        .vod-recording-item.active { background: rgba(99,102,241,0.18); }
        .vod-recording-item .recording-name { display: block; font-size: 0.9rem; }
        .vod-recording-item .recording-meta { display: block; font-size: 0.75rem; opacity: 0.65; margin-top: 2px; }
    </style>
</head>

<body>
    <div class="background-gradients">
        <div class="gradient-blob shape-1"></div>
        <div class="gradient-blob shape-2"></div>
    </div>

    <div class="monitor-container">
        <header class="glass-panel">
            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="23 7 16 12 23 17 23 7"/>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                </svg>
                <h1>Grabaciones</h1>
            </div>
            <div class="status-panel">
                <a href="/camara" class="header-icon-btn" title="Volver al monitor en vivo" style="text-decoration:none;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </a>
            </div>
        </header>

        <main class="vod-layout">
            <aside class="vod-sidebar glass-panel">
                <h2>Todas las grabaciones</h2>
                <div id="vod-list"></div>
            </aside>

            <section class="vod-player-panel glass-panel">
                <div class="vod-video-wrap">
                    <video id="vod-video" controls playsinline preload="metadata"></video>
                    <div class="vod-overlay" id="vod-overlay">
                        <div class="spinner"></div>
                        <span id="vod-overlay-text">Preparando video…</span>
                        <small id="vod-overlay-hint">La primera vez se convierte el archivo; puede tardar unos segundos.</small>
                    </div>
                </div>

                <div class="vod-meta">
                    <span class="vod-title" id="vod-title">—</span>
                    <div class="vod-speed" id="vod-speed">
                        <span class="vod-speed-label">Velocidad:</span>
                        <button class="speed-btn active" data-rate="1">x1</button>
                        <button class="speed-btn" data-rate="2">x2</button>
                        <button class="speed-btn" data-rate="4">x4</button>
                        <button class="speed-btn" data-rate="8">x8</button>
                        <button class="speed-btn" data-rate="16">x16</button>
                        <button class="speed-btn" data-rate="32">x32</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="vod.js"></script>
</body>
</html>
